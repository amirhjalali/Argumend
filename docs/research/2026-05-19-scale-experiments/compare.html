<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { background:#f4f1eb; font-family: ui-sans-serif, system-ui; color:#3d3a36; margin:0; padding:40px; }
  h2 { font-weight:600; letter-spacing:.04em; font-size:14px; text-transform:uppercase; color:#7a7068; margin:0 0 8px; }
  .row { display:flex; gap:48px; flex-wrap:wrap; margin-bottom:48px; }
  .cell { background:#fffdf9; border:1px solid rgba(120,113,108,.25); border-radius:14px; padding:28px 24px; width:320px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .scalewrap { width:240px; height:110px; margin:0 auto; }
  .lbl { display:flex; justify-content:space-between; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:#a8a29e; margin-top:14px; }
  .lbl b { color:#3a6965; font-family: ui-monospace, monospace; font-size:20px; }
  .lbl .a b { color:#8B5A3C; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell">
      <h2>Current (shipping)</h2>
      <div class="scalewrap">
        <!-- current implementation, tilt -4deg (56/44) -->
        <svg width="100%" height="100%" viewBox="0 0 180 70" style="color:#a8a29e">
          <line x1="90" y1="24" x2="90" y2="58" stroke="currentColor" stroke-width="2" />
          <line x1="70" y1="58" x2="110" y2="58" stroke="currentColor" stroke-width="2" />
          <g transform="rotate(-4 90 24)">
            <line x1="30" y1="24" x2="150" y2="24" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
            <circle cx="30" cy="24" r="4" fill="#4f7b77" />
            <circle cx="150" cy="24" r="4" fill="#78716c" />
            <line x1="30" y1="24" x2="30" y2="40" stroke="#4f7b77" stroke-width="2" />
            <line x1="150" y1="24" x2="150" y2="40" stroke="#78716c" stroke-width="2" />
            <line x1="20" y1="40" x2="40" y2="40" stroke="#4f7b77" stroke-width="2" />
            <line x1="140" y1="40" x2="160" y2="40" stroke="#78716c" stroke-width="2" />
          </g>
          <circle cx="90" cy="24" r="6" fill="#fefcf9" stroke="#78716c" stroke-width="2" />
        </svg>
      </div>
      <div class="lbl"><span>For <b>56</b></span><span class="a">Against <b>44</b></span></div>
    </div>

    <div class="cell">
      <h2>Redesign (hand-authored)</h2>
      <div class="scalewrap" id="mine"></div>
      <div class="lbl"><span>For <b>56</b></span><span class="a">Against <b>44</b></span></div>
    </div>

    <div class="cell">
      <h2>Codex output</h2>
      <div class="scalewrap" id="codex"><em style="font-size:12px;color:#a8a29e">pending…</em></div>
      <div class="lbl"><span>For <b>56</b></span><span class="a">Against <b>44</b></span></div>
    </div>
  </div>

  <!-- balanced state of redesign for reference -->
  <div class="row">
    <div class="cell">
      <h2>Redesign — balanced (50/50)</h2>
      <div class="scalewrap" id="mine-bal"></div>
    </div>
    <div class="cell">
      <h2>Redesign — heavy for (80/20)</h2>
      <div class="scalewrap" id="mine-heavy"></div>
    </div>
  </div>

<script>
function scale(tiltDeg) {
  // fulcrum at (90,26); beam ends (32,26)/(148,26); pans hang to ~y52
  return `
  <svg width="100%" height="100%" viewBox="0 0 180 80" preserveAspectRatio="xMidYMid meet">
    <!-- ground shadow -->
    <ellipse cx="90" cy="73" rx="30" ry="2.4" fill="#78716c" opacity="0.18"/>
    <!-- pedestal (stationary) -->
    <path d="M82 70 L98 70 L95 64 L85 64 Z" fill="#57534e"/>
    <path d="M70 72 Q90 68 110 72 L108 70 Q90 67 72 70 Z" fill="#57534e"/>
    <rect x="70" y="71.5" width="40" height="2.2" rx="1.1" fill="#57534e"/>
    <path d="M88.4 64 L91.6 64 L90.8 30 L89.2 30 Z" fill="#6b6258"/>
    <!-- fulcrum knob -->
    <path d="M84 30 L90 22 L96 30 Z" fill="#3a6965"/>
    <circle cx="90" cy="26" r="2.2" fill="#2c514e"/>

    <!-- BEAM GROUP (rotates) -->
    <g transform="rotate(${tiltDeg} 90 26)">
      <!-- beam: tapered bar -->
      <path d="M32 26 Q90 21.5 148 26 Q90 30.5 32 26 Z" fill="#3a6965"/>
      <line x1="34" y1="25.2" x2="146" y2="25.2" stroke="#5b8d88" stroke-width="0.6" opacity="0.8"/>
      <!-- center boss -->
      <circle cx="90" cy="26" r="3.4" fill="#3a6965"/>
      <circle cx="90" cy="26" r="1.4" fill="#bcd2cf"/>
      <!-- end knobs -->
      <circle cx="32" cy="26" r="2.1" fill="#3a6965"/>
      <circle cx="148" cy="26" r="2.1" fill="#3a6965"/>

      <!-- LEFT pan (FOR / teal) -->
      <line x1="32" y1="26" x2="22" y2="45" stroke="#3a6965" stroke-width="0.9"/>
      <line x1="32" y1="26" x2="42" y2="45" stroke="#3a6965" stroke-width="0.9"/>
      <path d="M17 45 L47 45 Q42 56 32 56 Q22 56 17 45 Z" fill="#3a6965" fill-opacity="0.16" stroke="#3a6965" stroke-width="1.3"/>
      <line x1="15.5" y1="45" x2="48.5" y2="45" stroke="#3a6965" stroke-width="1.5" stroke-linecap="round"/>

      <!-- RIGHT pan (AGAINST / brown) -->
      <line x1="148" y1="26" x2="138" y2="45" stroke="#8B5A3C" stroke-width="0.9"/>
      <line x1="148" y1="26" x2="158" y2="45" stroke="#8B5A3C" stroke-width="0.9"/>
      <path d="M133 45 L163 45 Q158 56 148 56 Q138 56 133 45 Z" fill="#8B5A3C" fill-opacity="0.14" stroke="#8B5A3C" stroke-width="1.3"/>
      <line x1="131.5" y1="45" x2="164.5" y2="45" stroke="#8B5A3C" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </svg>`;
}
document.getElementById('mine').innerHTML = scale(-4);
document.getElementById('mine-bal').innerHTML = scale(0);
document.getElementById('mine-heavy').innerHTML = scale(-6);
</script>
</body>
</html>
