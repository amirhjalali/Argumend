name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test
        # `bun test` invokes Bun's native runner, which ignores vitest.config
        # (happy-dom) — so component tests fail with "document is not defined".
        # The suite is vitest; run it in single-run mode via the project script.
        run: bun run test:ci
      - name: Build
        run: bun run build
